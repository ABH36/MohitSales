version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: mohit-industries-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: mohit_industries
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mohit_industries"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mohit-industries-app
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:password123@db:5432/mohit_industries?schema=public
      - JWT_SECRET=change-this-to-a-long-random-secret-in-production-123456
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_SECURE=false
      - SMTP_USER=your-email@gmail.com
      - SMTP_PASS=your-gmail-app-password
      - SMTP_TO_INQUIRY=info@yourdomain.com
      - SMTP_TO_FEEDBACK=info@yourdomain.com
      - NEXT_PUBLIC_SITE_URL=http://localhost:3000
      - NEXT_PUBLIC_DEFAULT_LOCALE=en
      - CLOUDINARY_CLOUD_NAME=your_cloud_name_here
      - CLOUDINARY_API_KEY=your_api_key_here
      - CLOUDINARY_API_SECRET=your_api_secret_here
    # Optionally load variables from host .env file
    # env_file:
    #   - .env

volumes:
  postgres_data:
